services:
  modelbox:
    build:
      context: .
      args:
        # Que modelos incluir en la imagen. En Dokploy se setea como build arg.
        # Ej.: "supertonic,pocket,whisper" deja una imagen sin Qwen/transformers.
        MODELS: ${MODELS:-supertonic,pocket,qwen,whisper}
    image: modelbox:latest
    container_name: modelbox
    ports:
      - "7860:7860"
    environment:
      # Un solo volumen persistente: /modelbox-data/hf, /modelbox-data/state, /modelbox-data/supertonic,
      # /modelbox-data/outputs, /modelbox-data/cache y /modelbox-data/pocket-weights viven adentro.
      MODELBOX_DATA_DIR: /modelbox-data
      HF_HOME: /modelbox-data/hf
      XDG_CACHE_HOME: /modelbox-data/cache
      # Inferencias en paralelo (en CPU, 1 ya usa todos los cores; el resto va a cola).
      MODELBOX_MAX_CONCURRENT: ${MODELBOX_MAX_CONCURRENT:-1}
      # Tamano de Whisper (small/medium/large-v3). small int8 ~= 1 GB RAM.
      MODELBOX_WHISPER_SIZE: ${MODELBOX_WHISPER_SIZE:-small}
      # Tope de tamano para audios subidos a /api/clone y /api/transcribe.
      MODELBOX_MAX_UPLOAD_MB: ${MODELBOX_MAX_UPLOAD_MB:-25}
      # Configura estos en Dokploy. Si quedan vacios: panel abierto + API apagada.
      PANEL_USER: ${PANEL_USER:-}
      PANEL_PASSWORD: ${PANEL_PASSWORD:-}
      API_TOKEN: ${API_TOKEN:-}
    volumes:
      # Un solo volumen para todo lo persistente:
      # /modelbox-data/hf               cache de Hugging Face (Pocket/Qwen/Whisper)
      # /modelbox-data/state            modelos descargados / habilitados para la API
      # /modelbox-data/supertonic       pesos de Supertonic-3
      # /modelbox-data/outputs          audios generados
      # /modelbox-data/cache            cache gen?rica de librer?as
      # /modelbox-data/pocket-weights   model.safetensors gated de Pocket-TTS (opcional)
      - modelbox-data:/modelbox-data
    restart: unless-stopped
    # Qwen3-TTS necesita ~9.6 GB de RAM residente. En un VPS chico no lo
    # selecciones en la interfaz (Supertonic y Pocket corren en ~1 GB).
    # Descomenta para topar el uso de memoria del contenedor:
    # mem_limit: 4g

volumes:
  modelbox-data:
